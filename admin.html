<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llamabuzz · Administration</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b1120;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        h1 i {
            color: #22c55e;
            font-size: 2rem;
        }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #22c55e;
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -20px #22c55e;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #22c55e;
        }

        .stat-info h3 {
            font-size: 0.9rem;
            font-weight: 500;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-info .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            line-height: 1.2;
        }

        /* Filters */
        .filters {
            background: rgba(30, 41, 59, 0.3);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .filter-group i {
            color: #64748b;
        }

        select, input {
            background: transparent;
            border: none;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            padding: 0.25rem;
            outline: none;
        }

        select option {
            background: #1e293b;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
        }

        /* Table */
        .table-container {
            background: rgba(30, 41, 59, 0.3);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow-x: auto;
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            text-align: left;
            padding: 1.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: #e2e8f0;
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Status badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
        }

        .status-badge.pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .status-badge.validated {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status-badge.rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .btn-icon:hover {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            transform: scale(1.05);
        }

        .btn-icon.delete:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Loading skeleton */
        .skeleton {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .skeleton td {
            height: 60px;
            background: rgba(255, 255, 255, 0.02);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            border-left: 4px solid #22c55e;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 1rem;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast i {
            color: #22c55e;
            font-size: 1.2rem;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        .toast.error i {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <!-- Toast notification -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Action effectuée</span>
    </div>

    <div class="header">
        <div class="header-left">
            <div class="logo">LLAMABUZZ</div>
            <h1>
                <i class="fas fa-crown"></i>
                Administration
            </h1>
        </div>
        <div class="badge" style="background:rgba(34,197,94,0.1); padding:0.5rem 1rem; border-radius:40px;">
            <i class="fas fa-shield-alt" style="color:#22c55e;"></i>
            Mode sécurisé
        </div>
    </div>

    <!-- Stats cards -->
    <div class="stats-grid" id="stats">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-vote-yea"></i></div>
            <div class="stat-info">
                <h3>Total votes</h3>
                <div class="stat-value" id="totalVotes">0</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-info">
                <h3>En attente</h3>
                <div class="stat-value" id="pendingVotes">0</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
            <div class="stat-info">
                <h3>Validés</h3>
                <div class="stat-value" id="validatedVotes">0</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div class="stat-info">
                <h3>Candidats</h3>
                <div class="stat-value" id="totalCandidates">0</div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="filters">
        <div class="filter-group">
            <i class="fas fa-filter"></i>
            <select id="statusFilter">
                <option value="all">Tous les statuts</option>
                <option value="pending">En attente</option>
                <option value="validated">Validé</option>
                <option value="rejected">Rejeté</option>
            </select>
        </div>
        
        <div class="filter-group search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Rechercher par nom, numéro...">
        </div>
        
        <div class="filter-group">
            <i class="fas fa-sort-amount-down"></i>
            <select id="sortFilter">
                <option value="date_desc">Plus récent</option>
                <option value="date_asc">Plus ancien</option>
                <option value="votes_desc">Plus de votes</option>
            </select>
        </div>
    </div>

    <!-- Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Votant</th>
                    <th>Numéro</th>
                    <th>Candidat</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="votesList">
                <!-- Skeleton loading -->
                <tr class="skeleton">
                    <td colspan="6" style="text-align:center;">Chargement...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { supabase } from "./js/supabase.js"

        // Elements DOM
        const votesList = document.getElementById('votesList')
        const toast = document.getElementById('toast')
        const toastMessage = document.getElementById('toastMessage')
        
        // Stats elements
        const totalVotesEl = document.getElementById('totalVotes')
        const pendingVotesEl = document.getElementById('pendingVotes')
        const validatedVotesEl = document.getElementById('validatedVotes')
        const totalCandidatesEl = document.getElementById('totalCandidates')

        // Filters
        const statusFilter = document.getElementById('statusFilter')
        const searchInput = document.getElementById('searchInput')
        const sortFilter = document.getElementById('sortFilter')

        let votes = []
        let candidates = new Set()

        // Afficher toast
        function showToast(message, isError = false) {
            toastMessage.textContent = message
            toast.className = `toast ${isError ? 'error' : ''}`
            toast.classList.add('show')
            setTimeout(() => toast.classList.remove('show'), 3000)
        }

        // Mettre à jour les stats
        async function updateStats() {
            try {
                // Compter tous les votes
                const { count: totalVotes } = await supabase
                    .from('votes')
                    .select('*', { count: 'exact', head: true })

                // Votes en attente
                const { count: pendingVotes } = await supabase
                    .from('votes')
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'pending')

                // Votes validés
                const { count: validatedVotes } = await supabase
                    .from('votes')
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'validated')

                // Nombre de candidats uniques
                const { data: votesData } = await supabase
                    .from('votes')
                    .select('candidate_name')

                const uniqueCandidates = new Set(votesData?.map(v => v.candidate_name) || [])

                // Mettre à jour l'UI
                totalVotesEl.textContent = totalVotes || 0
                pendingVotesEl.textContent = pendingVotes || 0
                validatedVotesEl.textContent = validatedVotes || 0
                totalCandidatesEl.textContent = uniqueCandidates.size || 0

            } catch (error) {
                console.error('Erreur stats:', error)
            }
        }

        // Charger les votes
        async function loadVotes() {
            try {
                let query = supabase
                    .from('votes')
                    .select('*')

                // Appliquer filtre status
                if (statusFilter.value !== 'all') {
                    query = query.eq('status', statusFilter.value)
                }

                // Appliquer le tri
                switch(sortFilter.value) {
                    case 'date_desc':
                        query = query.order('created_at', { ascending: false })
                        break
                    case 'date_asc':
                        query = query.order('created_at', { ascending: true })
                        break
                    case 'votes_desc':
                        // Si vous avez un champ vote_count
                        query = query.order('vote_count', { ascending: false })
                        break
                }

                const { data, error } = await query

                if (error) throw error

                votes = data || []

                // Filtrer par recherche
                let filteredVotes = votes
                if (searchInput.value) {
                    const searchTerm = searchInput.value.toLowerCase()
                    filteredVotes = votes.filter(v => 
                        v.voter_name?.toLowerCase().includes(searchTerm) ||
                        v.voter_phone?.includes(searchTerm) ||
                        v.candidate_name?.toLowerCase().includes(searchTerm)
                    )
                }

                // Afficher les votes
                if (filteredVotes.length === 0) {
                    votesList.innerHTML = `
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <i class="fas fa-inbox"></i>
                                    <h3>Aucun vote trouvé</h3>
                                    <p>Les votes apparaîtront ici quand ils seront créés.</p>
                                </div>
                            </td>
                        </tr>
                    `
                } else {
                    votesList.innerHTML = filteredVotes.map(vote => `
                        <tr>
                            <td>
                                <div style="display:flex; align-items:center; gap:0.5rem;">
                                    <i class="fas fa-user-circle" style="color:#22c55e;"></i>
                                    ${vote.voter_name || 'Anonyme'}
                                </div>
                            </td>
                            <td>${vote.voter_phone || 'Non renseigné'}</td>
                            <td>
                                <span style="color:#22c55e; font-weight:500;">
                                    ${vote.candidate_name || 'Non spécifié'}
                                </span>
                            </td>
                            <td>
                                <span class="status-badge ${vote.status || 'pending'}">
                                    <i class="fas fa-circle" style="font-size:0.5rem;"></i>
                                    ${vote.status === 'validated' ? 'Validé' : 
                                      vote.status === 'rejected' ? 'Rejeté' : 
                                      'En attente'}
                                </span>
                            </td>
                            <td>
                                ${vote.created_at ? new Date(vote.created_at).toLocaleDateString('fr-FR', {
                                    day: '2-digit',
                                    month: '2-digit',
                                    hour: '2-digit',
                                    minute: '2-digit'
                                }) : 'Date inconnue'}
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <button class="btn-icon" onclick="updateStatus('${vote.id}', 'validated')" title="Valider">
                                        <i class="fas fa-check"></i>
                                    </button>
                                    <button class="btn-icon" onclick="updateStatus('${vote.id}', 'pending')" title="En attente">
                                        <i class="fas fa-clock"></i>
                                    </button>
                                    <button class="btn-icon delete" onclick="updateStatus('${vote.id}', 'rejected')" title="Rejeter">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `).join('')
                }

                // Mettre à jour les stats
                await updateStats()

            } catch (error) {
                console.error('Erreur chargement:', error)
                votesList.innerHTML = `
                    <tr>
                        <td colspan="6" style="color:#ef4444; text-align:center; padding:2rem;">
                            <i class="fas fa-exclamation-triangle"></i>
                            Erreur de chargement des données
                        </td>
                    </tr>
                `
            }
        }

        // Mettre à jour le statut d'un vote
        window.updateStatus = async (voteId, status) => {
            try {
                const { error } = await supabase
                    .from('votes')
                    .update({ status, updated_at: new Date() })
                    .eq('id', voteId)

                if (error) throw error

                showToast(`Statut mis à jour : ${status}`)
                loadVotes() // Recharger la liste

            } catch (error) {
                console.error('Erreur mise à jour:', error)
                showToast("Erreur lors de la mise à jour", true)
            }
        }

        // Event listeners pour les filtres
        statusFilter.addEventListener('change', loadVotes)
        searchInput.addEventListener('input', loadVotes)
        sortFilter.addEventListener('change', loadVotes)

        // Chargement initial
        loadVotes()

        // Rafraîchir toutes les 30 secondes
        setInterval(loadVotes, 30000)
    </script>
</body>
</html>
