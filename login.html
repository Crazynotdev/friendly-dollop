<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llamabuzz · Connexion candidat</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b1120;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Background animé */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -10%;
            width: 120%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(34, 197, 94, 0.15) 0%, transparent 50%);
            animation: pulse 10s ease infinite;
        }

        .background::after {
            content: '';
            position: absolute;
            bottom: -50%;
            right: -10%;
            width: 120%;
            height: 200%;
            background: radial-gradient(circle at 70% 50%, rgba(34, 197, 94, 0.1) 0%, transparent 50%);
            animation: pulse 15s ease infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* Logo flottant */
        .logo-corner {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 10;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        /* Container principal */
        .container {
            width: 100%;
            max-width: 460px;
            padding: 1.5rem;
            position: relative;
        }

        /* Carte de connexion */
        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #22c55e, #4ade80, #22c55e, transparent);
            background-size: 200% 100%;
            animation: gradient 3s linear infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* En-tête de la carte */
        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .icon-wrapper {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #22c55e20, #16a34a20);
            border: 2px solid #22c55e;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: #22c55e;
            transform: rotate(0deg);
            transition: transform 0.3s ease;
        }

        .login-card:hover .icon-wrapper {
            transform: rotate(5deg) scale(1.05);
        }

        .card-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        /* Formulaire */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: #64748b;
            font-size: 1rem;
            transition: color 0.2s ease;
            z-index: 1;
        }

        input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            color: white;
            outline: none;
            transition: all 0.2s ease;
        }

        input:hover {
            border-color: rgba(34, 197, 94, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }

        input:focus {
            border-color: #22c55e;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }

        input:focus + .input-icon {
            color: #22c55e;
        }

        input::placeholder {
            color: #475569;
            font-weight: 300;
        }

        /* Options supplémentaires */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1.5rem 0;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #22c55e;
            margin: 0;
            padding: 0;
        }

        .remember-me span {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .forgot-password {
            color: #22c55e;
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .forgot-password:hover {
            color: #4ade80;
            text-decoration: underline;
        }

        /* Bouton de connexion */
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px #22c55e;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn i {
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }

        .login-btn:hover i {
            transform: translateX(5px);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Séparateur */
        .separator {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            color: #475569;
        }

        .separator-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #475569, transparent);
        }

        .separator-text {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Lien d'inscription */
        .register-link {
            text-align: center;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .register-link a {
            color: #22c55e;
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.5rem;
            transition: all 0.2s ease;
        }

        .register-link a:hover {
            color: #4ade80;
            text-decoration: underline;
        }

        /* Messages d'erreur */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 14px;
            padding: 0.75rem 1rem;
            margin-top: 1rem;
            color: #ef4444;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 14px;
            padding: 0.75rem 1rem;
            margin-top: 1rem;
            color: #22c55e;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Loading spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer-links {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #475569;
        }

        .footer-links a {
            color: #64748b;
            text-decoration: none;
            margin: 0 0.5rem;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: #22c55e;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .logo-corner {
                top: 1rem;
                left: 1rem;
            }
            
            .login-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="logo-corner">
        <div class="logo">LLAMABUZZ</div>
    </div>

    <div class="container">
        <div class="login-card">
            <div class="card-header">
                <div class="icon-wrapper">
                    <i class="fas fa-crown"></i>
                </div>
                <h2>Connexion</h2>
                <p>Espace candidat Llamabuzz</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="input-label" for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="ton@email.com" 
                            required 
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="input-label" for="password">Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••" 
                            required 
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Se souvenir de moi</span>
                    </label>
                    <a href="#" class="forgot-password">
                        <i class="fas fa-question-circle"></i> Mot de passe oublié ?
                    </a>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <span>Se connecter</span>
                    <i class="fas fa-arrow-right"></i>
                </button>

                <div id="messageContainer"></div>
            </form>

            <div class="separator">
                <div class="separator-line"></div>
                <span class="separator-text">ou</span>
                <div class="separator-line"></div>
            </div>

            <div class="register-link">
                Pas encore de compte ?
                <a href="register.html">
                    S'inscrire <i class="fas fa-user-plus"></i>
                </a>
            </div>

            <div class="footer-links">
                <a href="rules.html">Conditions d'utilisation</a>
                •
                <a href="rules.html">Politique de confidentialité</a>
                •
                <a href="rules.html">Aide</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from "./crazy/supabase.js"

        const loginForm = document.getElementById('loginForm')
        const submitBtn = document.getElementById('submitBtn')
        const messageContainer = document.getElementById('messageContainer')
        const rememberCheckbox = document.getElementById('remember')

        // Vérifier s'il y a un email sauvegardé
        const savedEmail = localStorage.getItem('saved_email')
        if (savedEmail) {
            document.getElementById('email').value = savedEmail
            rememberCheckbox.checked = true
        }

        // Fonction pour afficher les messages
        function showMessage(type, text) {
            const className = type === 'error' ? 'error-message' : 'success-message'
            const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'
            
            messageContainer.innerHTML = `
                <div class="${className}">
                    <i class="fas ${icon}"></i>
                    <span>${text}</span>
                </div>
            `

            // Auto-hide après 5 secondes
            setTimeout(() => {
                messageContainer.innerHTML = ''
            }, 5000)
        }

        // Fonction pour définir l'état de chargement
        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true
                submitBtn.innerHTML = `
                    <div class="spinner"></div>
                    <span>Connexion...</span>
                `
            } else {
                submitBtn.disabled = false
                submitBtn.innerHTML = `
                    <span>Se connecter</span>
                    <i class="fas fa-arrow-right"></i>
                `
            }
        }

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault()
            
            const email = document.getElementById("email").value.trim()
            const password = document.getElementById("password").value
            const remember = rememberCheckbox.checked

            // Validation basique
            if (!email || !password) {
                showMessage('error', 'Veuillez remplir tous les champs')
                return
            }

            if (password.length < 6) {
                showMessage('error', 'Le mot de passe doit contenir au moins 6 caractères')
                return
            }

            setLoading(true)

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                })

                if (error) {
                    console.error('Erreur Supabase:', error)
                    
                    // Messages d'erreur personnalisés
                    if (error.message.includes('Invalid login credentials')) {
                        showMessage('error', 'Email ou mot de passe incorrect')
                    } else if (error.message.includes('Email not confirmed')) {
                        showMessage('error', 'Veuillez confirmer votre email avant de vous connecter')
                    } else {
                        showMessage('error', 'Erreur de connexion. Veuillez réessayer.')
                    }
                    
                    setLoading(false)
                    return
                }

                // Sauvegarder l'email si "se souvenir de moi" est coché
                if (remember) {
                    localStorage.setItem('saved_email', email)
                } else {
                    localStorage.removeItem('saved_email')
                }

                // Sauvegarder l'ID utilisateur
                localStorage.setItem("user_id", data.user.id)
                
                // Message de succès
                showMessage('success', 'Connexion réussie ! Redirection...')
                
                // Redirection après un court délai
                setTimeout(() => {
                    window.location.href = "dashboard.html"
                }, 1000)

            } catch (error) {
                console.error('Erreur inattendue:', error)
                showMessage('error', 'Une erreur inattendue est survenue')
                setLoading(false)
            }
        })

        // Animation des inputs
        const inputs = document.querySelectorAll('input')
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.input-icon').style.color = '#22c55e'
            })
            
            input.addEventListener('blur', () => {
                if (!input.value) {
                    input.parentElement.querySelector('.input-icon').style.color = '#64748b'
                }
            })
        })
    </script>
</body>
</html>
